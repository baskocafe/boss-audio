<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="voice-message-container">
        <div class="boss-icon">
            <img src="./assets/boss.jpg" alt="">
        </div>

        <div class="voice-message">
            <button class="play-pause-btn" id="playPauseBtn">
                <svg class="play-icon" viewBox="0 0 24 24" width="20" height="20">
                    <path fill="currentColor" d="M8 5v14l11-7z"/>
                </svg>
                <svg class="pause-icon" viewBox="0 0 24 24" width="20" height="20" style="display: none;">
                    <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>
        
            <div class="voice-progress-container">
                <div class="voice-progress-bar" id="progressBar">
                    <div class="voice-progress-fill" id="progressFill"></div>
                </div>
                <div class="voice-time" id="timeDisplay">0:00</div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
